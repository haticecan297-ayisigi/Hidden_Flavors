<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Flavors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hidden Flavors</h1>
        <nav>
            <!-- JS için ID'ler -->
            <input type="text" id="search-input" placeholder="Search for recipe...">
           <select id="era-filter">
                <option value="all">All Eras</option>
                <option value="Ancient Antiquity (Hittite)">Hittite Era</option>
                <option value="Ancient Antiquity (Mesopotamian)">Mesopotamian Era</option>
                <option value="Ancient Antiquity (Ancient Greek)">Ancient Greek Era</option>
                <option value="Ancient Roman Era">Ancient Roman Era</option>
                <option value="Anatolian Seljuk Era">Anatolian Seljuk Era</option>
                <option value="Ottoman Era">Ottoman Era</option>
                <option value="Traditional Spanish">Traditional Spanish Era</option>
                <option value="Modern Spanish">Modern Spanish Era</option>
                <option value="Traditional Italian">Traditional Italian Era</option>
                <option value="Modern Italian">Modern Italian Era</option>
                <option value="Traditional Korean">Traditional Korean Era</option>
                <option value="Modern Korean">Modern Korean Era</option>
            </select>
        </nav>
    </header>

    <main>
        <section id="recipe-container" class="grid-layout">
           
        </section>
    </main>
    <script type="module" src="script.js"></script>
    
</body>
</html>
