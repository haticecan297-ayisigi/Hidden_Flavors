<!DOCTYPE html>

    <title>Hidden Flavors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hidden Flavors</h1>
        <nav>
            <!-- JS için ID'ler -->
            <input type="text" id="search-input" placeholder="Search for recipe...">
            <select id="era-filter">
                <option value="all">All Era</option>
                <option value="Antik Çağ">Ancient Era</option>
                <option value="Ottoman">Ottoman Era</option>
                <option value="Seljuk">Anatolian Seljuk Era</option>
                <option value="Spanish">Spanish Era</option>
                <option value="Italian">Italian Era</option>
                <option value="Roman">Ancient Roman Era</option>
                <option value="Korean">Korean Era</option>
            </select>
        </nav>
    </header>

    <main>
        <section id="recipe-container" class="grid-layout">
           
        </section>
    </main>
    <script type="module" src="script.js"></script>
    
</body>
</html>
