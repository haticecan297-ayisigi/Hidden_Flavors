<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Flavors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hidden Flavors</h1>
        <nav>
            <button id="btn-show-favs" class="fav-filter-btn" style="display: none;">♡ My Favorites</button>
            <!-- JS için ID'ler -->
            <input type="text" id="search-input" placeholder="Search for recipe...">
           <select id="era-filter">
                <option value="all">All Eras</option>
                <option value="Ancient Antiquity (Hittite)">Hittite Era</option>
                <option value="Ancient Antiquity (Mesopotamian)">Mesopotamian Era</option>
                <option value="Ancient Antiquity (Ancient Greek)">Ancient Greek Era</option>
                <option value="Ancient Roman Era">Ancient Roman Era</option>
                <option value="Anatolian Seljuk Era">Anatolian Seljuk Era</option>
                <option value="Ottoman Era">Ottoman Era</option>
                <option value="Traditional Spanish">Traditional Spanish Era</option>
                <option value="Modern Spanish">Modern Spanish Era</option>
                <option value="Traditional Italian">Traditional Italian Era</option>
                <option value="Modern Italian">Modern Italian Era</option>
                <option value="Traditional Korean">Traditional Korean Era</option>
                <option value="Modern Korean">Modern Korean Era</option>
            </select>
        </nav>

        <div id="user-section" class="user-section">
                <button id="btn-login-trigger" class="btn-primary">Log In</button>
                <div id="user-profile" style="display: none;">
                    <span id="user-name-display" class="user-greeting"></span>
                    <button id="btn-logout" class="btn-text">Logout</button>
                </div>
        </div>

    </header>

    <main>
        <section id="recipe-container" class="grid-layout">
           
        </section>
    </main>


   <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            
            <div id="login-form-view">
                <h2 style="color: var(--primary-color); margin-bottom: 10px;">Welcome Back</h2>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Log in to access your favorite recipes.</p>
                <input type="email" id="login-email" class="modal-input" placeholder="Email address" required>
                <input type="password" id="login-password" class="modal-input" placeholder="Password" required>
                <button id="btn-submit-login" class="btn-primary" style="width: 100%;">Log In</button>
                <div style="margin-top: 15px; font-size: 0.9rem;">
                    <a href="#" id="link-forgot-password" style="color: var(--text-muted); text-decoration: underline; margin-bottom: 10px; display: inline-block;">Forgot Password?</a>
                    <p>Don't have an account? <a href="#" id="link-show-register" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Sign Up</a></p>
                </div>
            </div>

            <div id="register-form-view" style="display: none;">
                <h2 style="color: var(--primary-color); margin-bottom: 10px;">Create an Account</h2>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Join us to save your culinary history.</p>
                <input type="email" id="register-email" class="modal-input" placeholder="Email address" required>
                <input type="password" id="register-password" class="modal-input" placeholder="Create a password" required>
                <button id="btn-submit-register" class="btn-primary" style="width: 100%;">Sign Up</button>
                <div style="margin-top: 15px; font-size: 0.9rem;">
                    <p>Already have an account? <a href="#" id="link-show-login" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Log In</a></p>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="script.js"></script>
    
</body>
</html>
